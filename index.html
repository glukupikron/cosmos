<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter From The Stars</title>
<style>
  @font-face {
    font-family: 'DXTypewriter';
    src: url('./fonts/DX타자Medium.ttf') format('truetype');
    font-display: swap;
  }

  @font-face {
    font-family: 'DXKorean';
    src: url('./fonts/DX타자Medium.ttf') format('truetype');
    font-display: swap;
    unicode-range: U+1100-11FF, U+3130-318F, U+AC00-D7A3;
  }

  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Nanum+Gothic+Coding:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --paper: #f5f0e8;
    --ink: #1a1a1a;
    --faded: #8a8478;
    --type-font: 'Courier Prime', 'DXKorean', 'DXTypewriter', 'Courier New', monospace;
  }

  html, body {
    background: var(--ink);
    font-family: var(--type-font);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* ══════════════════════════════════
     FALLING STARS
     ══════════════════════════════════ */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .falling-star {
    position: absolute;
    color: rgba(245, 240, 232, 0.6);
    font-family: serif;
    user-select: none;
    pointer-events: none;
    animation: starfall linear infinite;
    will-change: transform;
  }

  @keyframes starfall {
    0%   { transform: translateY(-5vh) rotate(0deg); opacity: 0; }
    5%   { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(105vh) rotate(45deg); opacity: 0; }
  }

  .falling-star.twinkle {
    animation: starfall linear infinite, twinkle 2s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* ══════════════════════════════════
     LAYOUT
     ══════════════════════════════════ */
  .page-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ══════════════════════════════════
     INTRO
     ══════════════════════════════════ */
  #intro {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    animation: fadeInUp 1.2s ease;
    width: 100%;
    max-width: 480px;
  }

  #intro h1 {
    font-family: var(--type-font);
    font-weight: 400;
    font-style: normal;
    color: var(--paper);
    font-size: clamp(1.5rem, 4vw, 2.6rem);
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    opacity: 0.9;
  }

  #intro p.subtitle {
    color: var(--faded);
    font-size: clamp(0.7rem, 1.6vw, 0.85rem);
    margin-bottom: 48px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .input-group {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    margin-bottom: 36px;
  }

  .input-col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .input-col label {
    color: var(--faded);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .input-col select {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--faded);
    color: var(--paper);
    font-family: var(--type-font);
    font-size: clamp(1.2rem, 2.5vw, 1.6rem);
    text-align: center;
    padding: 8px 12px;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    transition: border-color 0.3s;
  }

  .input-col select:focus {
    border-color: var(--paper);
  }

  .input-col select option {
    background: #222;
    color: var(--paper);
    font-size: 1rem;
  }

  .btn-generate {
    background: transparent;
    border: 1.5px solid var(--faded);
    color: var(--paper);
    font-family: var(--type-font);
    font-size: 1rem;
    letter-spacing: 0.2em;
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.4s ease;
    text-transform: uppercase;
  }

  .btn-generate:hover {
    background: var(--paper);
    color: var(--ink);
    border-color: var(--paper);
  }

  .btn-generate:active { transform: scale(0.97); }

  .error-msg {
    color: #c97;
    font-size: 0.8rem;
    margin-top: 14px;
    opacity: 0;
    transition: opacity 0.4s;
    font-family: var(--type-font);
    letter-spacing: 0.05em;
  }

  .error-msg.show { opacity: 1; }

  /* ══════════════════════════════════
     RESULT
     ══════════════════════════════════ */
  #result {
    display: none;
    width: 100%;
    max-width: 1100px;
    animation: fadeInUp 1s ease;
  }

  .paper-container {
    background: var(--paper);
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 620px;
    box-shadow:
      4px 4px 0 rgba(0,0,0,0.3),
      8px 8px 20px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(245,240,232,0.15);
  }

  .paper-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  .letter-side {
    padding: clamp(24px, 4vw, 52px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
    border-right: 1px solid rgba(0,0,0,0.08);
  }

  .letter-text {
    font-family: var(--type-font);
    font-size: clamp(0.82rem, 1.5vw, 1rem);
    line-height: 2;
    color: var(--ink);
    opacity: 0;
    min-height: 200px;
  }

  .letter-text.typing { opacity: 1; }
  .letter-text .char { opacity: 0; display: inline; }
  .letter-text .char.visible { opacity: 1; }

  .letter-divider {
    width: 60px; height: 1.5px;
    background: var(--ink);
    margin: 20px 0;
    opacity: 0;
    transition: opacity 0.6s ease 0.3s;
  }
  .letter-divider.visible { opacity: 0.3; }

  .page-number {
    font-size: 0.75rem;
    color: var(--faded);
    text-align: center;
    margin-top: 16px;
    letter-spacing: 0.3em;
    opacity: 0;
    transition: opacity 0.8s ease 0.6s;
  }
  .page-number.visible { opacity: 0.5; }

  .cosmos-side {
    background: #000;
    position: relative;
    overflow: hidden;
    min-height: 400px;
  }

  .cosmos-canvas {
    width: 100%; height: 100%; display: block;
  }

  .cosmos-image {
    width: 100%;
    height: 100%;
    display: none;
    object-fit: cover;
  }

  .btn-back {
    position: fixed;
    top: 20px; left: 20px;
    background: transparent;
    border: 1px solid rgba(245,240,232,0.3);
    color: var(--paper);
    font-family: var(--type-font);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    padding: 8px 20px;
    cursor: pointer;
    transition: all 0.3s;
    z-index: 100;
    display: none;
  }
  .btn-back:hover { background: var(--paper); color: var(--ink); }

  .mouse-comet {
    position: fixed;
    left: 0;
    top: 0;
    z-index: 9999;
    pointer-events: none;
    color: rgba(245,240,232,0.98);
    font-family: 'Courier Prime', 'DXKorean', 'DXTypewriter', monospace;
    font-size: 16px;
    line-height: 1;
    text-shadow: 0 0 4px rgba(245,240,232,0.35);
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .mouse-comet.visible {
    opacity: 1;
  }

  .mouse-comet.symbol {
    animation: cometGlyphPulse 0.9s ease-in-out infinite;
  }

  .cursor-trail-layer {
    position: fixed;
    inset: 0;
    z-index: 9998;
    pointer-events: none;
    overflow: hidden;
  }

  .cursor-trail {
    position: absolute;
    height: 0;
    border-top: 1.2px solid rgba(245,240,232,0.75);
    transform-origin: 0 0;
    filter: drop-shadow(0 0 2px rgba(245,240,232,0.2));
    animation: trailFade 0.55s ease-out forwards;
  }

  @media (hover: none), (pointer: coarse) {
    html, body { cursor: auto; }
    .mouse-comet { display: none; }
    .cursor-trail-layer { display: none; }
  }

  @media (max-width: 768px) {
    .page-wrapper { padding: 10px; }
    #intro h1 {
      font-size: clamp(1.85rem, 7.2vw, 2.35rem);
      letter-spacing: 0.05em;
    }
    #intro p.subtitle {
      font-size: clamp(0.85rem, 3.3vw, 1rem);
      letter-spacing: 0.12em;
      margin-bottom: 36px;
    }
    .input-col label {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
    }
    .input-col select {
      font-size: clamp(1.32rem, 5vw, 1.6rem);
      padding: 10px 12px;
    }
    .btn-generate {
      font-size: 1.05rem;
      letter-spacing: 0.14em;
      padding: 14px 28px;
    }
    .error-msg {
      font-size: 0.9rem;
    }
    .paper-container {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
    }
    .cosmos-side { order: -1; min-height: 280px; }
    .letter-side {
      border-right: none;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding: clamp(22px, 6.2vw, 32px);
    }
    .letter-text {
      font-size: clamp(1rem, 3.9vw, 1.12rem);
      line-height: 1.9;
      min-height: 170px;
    }
    .page-number {
      font-size: 0.84rem;
      letter-spacing: 0.18em;
    }
    .btn-back { top: 10px; left: 10px; }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes cometPulse {
    0%, 100% { opacity: 1; transform: translateY(0); }
    50% { opacity: 0.65; transform: translateY(-1px); }
  }
  @keyframes cometTrail {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.6; }
  }
  @keyframes trailFade {
    0% { opacity: 0.75; }
    100% { opacity: 0; }
  }
  @keyframes cometGlyphPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    50% { transform: translate(-50%, -50%) scale(1.06); opacity: 0.85; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0; }
  }
</style>
</head>
<body>

<div id="starfield"></div>
<div class="cursor-trail-layer" id="cursorTrailLayer" aria-hidden="true"></div>
<div class="mouse-comet symbol" id="mouseComet" aria-hidden="true">☄</div>
<button class="btn-back" id="btnBack" onclick="goBack()">← back</button>

<div class="page-wrapper">

  <!-- INTRO -->
  <div id="intro">
    <h1>Dear Artlab,</h1>
    <p class="subtitle">— when is your birthday? —</p>

    <div class="input-group">
      <div class="input-col">
        <label>Month</label>
        <select id="monthSelect"></select>
      </div>
      <div class="input-col">
        <label>Day</label>
        <select id="daySelect"></select>
      </div>
    </div>

    <button class="btn-generate" onclick="generate()">Open Your Letter</button>
    <div class="error-msg" id="errorMsg">No letter found for this birthday yet.</div>
  </div>

  <!-- RESULT -->
  <div id="result">
    <div class="paper-container">
      <div class="letter-side">
        <div class="letter-text" id="letterText"></div>
        <div class="letter-divider" id="divider"></div>
        <div class="page-number" id="pageNum">2026.04.20</div>
      </div>
      <div class="cosmos-side">
        <img class="cosmos-image" id="cosmosImage" alt="cosmos image">
        <canvas class="cosmos-canvas" id="cosmosCanvas"></canvas>
      </div>
    </div>
  </div>

</div>

<script>
// ┌─────────────────────────────────────────────────┐
// │                                                 │
// │   ★  PEOPLE DATABASE  ★                         │
// │                                                 │
// │   여기에 사람들을 추가하세요!                      │
// │   month: 0=Jan, 1=Feb, ... 11=Dec               │
// │   day: 1-31                                     │
// │   letter: 그 사람에게 보내는 편지 내용              │
// │                                                 │
// │   같은 생일이면 첫 번째 매칭된 사람이 나옵니다.      │
// │                                                 │
// └─────────────────────────────────────────────────┘

const PEOPLE = [
  {
    name: "지민",
    month: 2,   // March (0-indexed)
    day: 15,
    letter: `A long, long time ago,
you didn't need a body.
You played amongst the
stars, happy and free;
long before bodies
were ever invented.

And then, on a quiet
March morning, you
chose to arrive.

Happy Birthday, 지민.
You are stardust,
remembering itself."`
  },
  {
    name: "수현",
    month: 7,   // August
    day: 22,
    letter: `A long, long time ago,
you didn't need a body.
You danced between
galaxies, weightless
and wonderful.

Then on an August night,
warm with summer air,
you decided to begin.

Happy Birthday, 수현.
The stars still
remember your name."`
  },
  {
    name: "민호",
    month: 0,   // January
    day: 5,
    letter: `A long, long time ago,
you didn't need a body.
You were light itself,
traveling endless
distances without
ever getting tired.

Then in the stillness
of a January dawn,
you chose this world.

Happy Birthday, 민호.
You carry the whole
universe inside you."`
  },

  {
    name: "최두은",
    month: 5,   // June
    day: 27,
    letter: `안녕하세요 상무님!
항상 실원들을 배려하시고 입장을 먼저 생각해주시고, 
가까이 다가가려고 노력해주셔서 감사하다는 
말씀 먼저 드리고 싶어요.
상무님의 시선, 인사이트, 관점들을 저도 많이 배우려고 
나름대로 애썼는데 돌이켜보면 그 시간들이 
저한테 정말 귀했습니다!
톰 삭스 전시 보고 난 후 식사 자리에서 
저도 모르게 주저리주저리 많은 걸 털어놓았을 때, 
끝까지 다 경청해주시고 개인적인 경험도 
많이 나누어주셔서 감사했어요. 
상무님 앞에서는 늘 조금씩 긴장하게 되면서도, 
어떤 부분에서는 아주 편하게 느꼈던 것 같아요. 
그렇게 느낄 수 있도록 배려해주셔서 감사합니다..!

아트랩의 앞으로의 여정 또한 진심으로 응원하고, 
계속 지켜보겠습니다! 그동안 정말 감사했습니다.`
  },
  {
    name: "한송이",
    month: 0,   // January
    day: 21,
    letter: `안녕하세요 팀장님!
그동안 누구보다 팀원을 먼저 생각해주시는 
팀장님 밑에서 일할 수 있어서 감사했습니다. 
꼼꼼하고 완벽함을 중시하시는 팀장님 덕분에, 
일하면서 많이 배울 수 있었어요.
그동안 세심히 지켜봐주시고 챙겨주셔서 감사해요. 
앞으로도 연락드릴게요!
감사합니다.`
  },
  {
    name: "황미진",
    month: 5,   // June
    day: 16,
    letter: `안녕하세요 미진 책임님! 
    2년 4개월동안 깐부가 되어주셔서 감사합니다... <3
업무에 있어서도, 아트 쪽의 인사이트에 있어서도 
책임님께 정말 많이 배웠습니다!
항상 책임님의 시선을 따라가서 그 끝에 무엇이 있을지 
혼자 궁리하곤 했었어요.
앞으로도 좋은 소식 있으며 나누고, 자주 연락드릴게요!
감사합니다!!`
  },
  {
    name: "정윤환",
    month: 4,   // May
    day: 2,
    letter: `윤환 책임님~ 항상 유쾌하게 대해주셔서 감사해요!
담배도 피시고... 괜히 동질감을 많이 느꼈던 것 같아요.
1그룹이었다면 좀더 많이 이야기 나눌 수 있었을텐데... 아쉬워요
책임님의 앞으로의 계획들도 응원합니다! 
말씀하신 대로 나중에 회식할 때 놀러가도 되지요..?`
  },
  {
    name: "김예지",
    month: 4,   // May
    day: 17,
    letter: `안녕하세요 예지 책임님! 
    언제나 친절한 미소로 반겨주셔서 감사합니다... 
    천사같다고 생각했어요 <3
    책임님을 보면서 항상 어른스러움, 사려깊음이 무엇인지 
    다시 알게 되었던 것 같아요. 
    디지털 팀에서도 따뜻하게 배려해주셔서 감사합니다. 
    덕분에 많이 성장할 수 있었습니다!
    언젠가 서울대입구에서 같이 마작을... 칠 날이 오기를...`
  },
  {
    name: "김혜진",
    month: 4,   // May
    day: 21,
    letter: `안녕하세요 혜진 매니저님! 
    그룹은 달랐지만, 디지털, 프로젝트 해시태그 진행하면서
    부족한 저를 열심히 커버쳐주셔서 감사합니다...
    특히 회의하면서 너무나 당당하고 프로페셔널하게
    회의를 이끌어가시는 모습이 아주 멋있었어요!
    맨저님 노래부르는 모습도 보고싶었는데..! 언젠가 기회가 있기를...`
  },
  {
    name: "김재영",
    month: 3,   // April
    day: 2,
    letter: `재영 매니저님~!
    가장 많은 프로젝트를 함께한 것 같은데요... 
    그동안 너무 감사했습니다!
    제가 어떤 방식으로도 조금만 기여해도 
    그 부분을 항상 알아주시고 인정해주셔서 감사했을 때가 많았어요!
    꼼꼼하게 봐주셔서 감사합니다... 결혼도 너무 축하드려요! 
    매니저님의 새로운 시작도 응원하겠습니다!`
  },
  {
    name: "조윤지",
    month: 4,   // May
    day: 10,
    letter: `윤지 매니저님~!
너무 슬퍼하지 마세요. 왜냐면 우리는 칭구. 계속 놀러다닐 거니까요.
윤지 매니저님과 함께한 많고도 적은 나날들...
앞으로도 이어질 것을 생각하면 매우 기쁘고 두근거리는군요.
노래방도 많이 가고 방탈출도 하고 연극도 보러 다녀요.
저는 이제 백수. 귀찮은 건 다 맡겨주세요~!
같이 계단 올라줘서 고마워요.
큭큭.`

function isMobileEnvironment() {
  return window.matchMedia('(max-width: 768px), (hover: none), (pointer: coarse)').matches;
}

function shouldHideStarOnMobile(ch) {
  return isMobileEnvironment() && MOBILE_HIDDEN_STAR_CHARS.has(ch);
}

const starPool = [];
STAR_CHARS.forEach(s => {
  if (shouldHideStarOnMobile(s.ch)) return;
  for (let i = 0; i < s.weight; i++) starPool.push(s);
});

function createFallingStar() {
  const sf = document.getElementById('starfield');
  const s = starPool[Math.floor(Math.random() * starPool.length)];
  const el = document.createElement('div');
  el.className = 'falling-star' + (Math.random() > 0.7 ? ' twinkle' : '');
  el.textContent = s.ch;
  const fontSize = s.size[0] + Math.random() * (s.size[1] - s.size[0]);
  const duration = 18 + Math.random() * 35;
  const delay = Math.random() * -duration;
  el.style.cssText = `
    left: ${Math.random()*100}%;
    font-size: ${fontSize}px;
    opacity: ${0.12 + Math.random()*0.5};
    animation-duration: ${duration}s;
    animation-delay: ${delay}s;
  `;
  sf.appendChild(el);
}
for (let i = 0; i < 60; i++) createFallingStar();

function findPerson(month, day) {
  return PEOPLE.find(p => p.month === month && p.day === day) || null;
}

function pickRandomNumberedBlock(text) {
  if (!text || typeof text !== 'string') return '';

  const normalized = text.replace(/\r\n/g, '\n').trim();
  const lines = normalized.split('\n');
  const blocks = [];
  let current = [];
  let hasNumberedHeader = false;

  for (const line of lines) {
    if (/^\s*\d+\s*$/.test(line)) {
      hasNumberedHeader = true;
      if (current.length > 0) blocks.push(current.join('\n').trim());
      current = [line.trim()];
      continue;
    }
    current.push(line);
  }

  if (current.length > 0) blocks.push(current.join('\n').trim());
  if (!hasNumberedHeader || blocks.length === 0) return normalized;

  const idx = Math.floor(Math.random() * blocks.length);
  return blocks[idx];
}

function seededRandom(seed) {
  let s = Math.abs(seed) || 1;
  return function() { s = (s * 16807) % 2147483647; return (s-1)/2147483646; };
}

function birthdaySeed(month, day) {
  return (month+1) * 100 + day + 7919;
}

function drawCosmos(canvas, seed) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height, rand = seededRandom(seed);

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const sm = ['✳','✴','✵','✶','∗','⁎','*'].filter(ch => !shouldHideStarOnMobile(ch));
  const md = ['✦','✧','✹','❋','✺'];
  const lg = ['✡','✫','✬','☆','✯'].filter(ch => !shouldHideStarOnMobile(ch));

  for (let i = 0; i < 80; i++) {
    ctx.fillStyle = `rgba(245,240,232,${rand()*0.5+0.3})`;
    ctx.font = `${8+rand()*6}px serif`;
    ctx.fillText(sm[Math.floor(rand()*sm.length)], rand()*w, rand()*h);
  }
  for (let i = 0; i < 20; i++) {
    ctx.fillStyle = `rgba(245,240,232,${rand()*0.4+0.5})`;
    ctx.font = `${14+rand()*8}px serif`;
    ctx.fillText(md[Math.floor(rand()*md.length)], rand()*w, rand()*h);
  }
  for (let i = 0; i < 6; i++) {
    const x = rand()*w*0.8+w*0.1, y = rand()*h*0.8+h*0.1, br = rand()*0.3+0.6;
    ctx.fillStyle = `rgba(245,240,232,${br})`;
    ctx.font = `${24+rand()*12}px serif`;
    ctx.fillText(lg[Math.floor(rand()*lg.length)], x, y);
    const grd = ctx.createRadialGradient(x,y,0,x,y,30+rand()*20);
    grd.addColorStop(0, `rgba(245,240,232,${br*0.08})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(x-50,y-50,100,100);
  }
  // clusters
  for (let c = 0; c < 2+Math.floor(rand()*3); c++) {
    const cx = rand()*w, cy = rand()*h*0.6;
    for (let i = 0; i < 8+Math.floor(rand()*12); i++) {
      ctx.fillStyle = `rgba(245,240,232,${rand()*0.4+0.4})`;
      ctx.font = `${8+rand()*5}px serif`;
      ctx.fillText(sm[Math.floor(rand()*sm.length)], cx+(rand()-0.5)*100, cy+(rand()-0.5)*80);
    }
  }
  // glow
  const hy = h*(0.6+rand()*0.15), gx = w*(0.3+rand()*0.4);
  const glow = ctx.createRadialGradient(gx,hy,0,gx,hy,w*0.35);
  glow.addColorStop(0,'rgba(245,240,232,0.15)');
  glow.addColorStop(0.4,'rgba(200,195,185,0.04)');
  glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0,0,w,h);
  // grain
  const img = ctx.getImageData(0,0,canvas.width,canvas.height);
  const d = img.data, gr = seededRandom(seed+777);
  for (let i = 0; i < d.length; i += 16) { const g=(gr()-0.5)*10; d[i]+=g; d[i+1]+=g; d[i+2]+=g; }
  ctx.putImageData(img,0,0);
}


// ══════════════════════════════════════════
// TYPEWRITER
// ══════════════════════════════════════════
let twTimeout = null;
function stopTypewriter() { if (twTimeout) { clearTimeout(twTimeout); twTimeout = null; } }

function typewriterEffect(el, text, cb) {
  stopTypewriter();
  el.innerHTML = '';
  el.classList.add('typing');

  const spans = [];
  for (let i = 0; i < text.length; i++) {
    if (text[i] === '\n') { el.appendChild(document.createElement('br')); spans.push(null); }
    else {
      const s = document.createElement('span');
      s.className = 'char'; s.textContent = text[i];
      el.appendChild(s); spans.push(s);
    }
  }

  let idx = 0;
  function next() {
    if (idx >= spans.length) {
      if (cb) cb();
      return;
    }
    if (!spans[idx]) { idx++; twTimeout = setTimeout(next, 100); return; }
    spans[idx].classList.add('visible'); idx++;
    const ch = text[idx-1];
    let delay = 30 + Math.random()*20;
    if (ch===',' || ch===';') delay = 140+Math.random()*60;
    if (ch==='.') delay = 220+Math.random()*80;
    if (ch==='\n') delay = 160;
    twTimeout = setTimeout(next, delay);
  }
  twTimeout = setTimeout(next, 400);
}


// ══════════════════════════════════════════
// GENERATE
// ══════════════════════════════════════════
let currentMonth, currentDay;

function showCanvasCosmos(canvasEl, imageEl, seed) {
  imageEl.style.display = 'none';
  canvasEl.style.display = 'block';
  setTimeout(() => drawCosmos(canvasEl, seed), 50);
}

function showImageOrFallback(imageEl, canvasEl, imagePaths, seed) {
  let idx = 0;

  function tryNext() {
    if (idx >= imagePaths.length) {
      showCanvasCosmos(canvasEl, imageEl, seed);
      return;
    }

    const src = imagePaths[idx++];
    imageEl.onload = () => {
      imageEl.style.display = 'block';
      canvasEl.style.display = 'none';
      imageEl.onload = null;
      imageEl.onerror = null;
    };
    imageEl.onerror = () => {
      imageEl.onload = null;
      imageEl.onerror = null;
      tryNext();
    };
    imageEl.src = src;
  }

  tryNext();
}

function buildPersonImageCandidates(person) {
  if (!person || !person.name) return [];
  return PERSON_IMAGE_EXTENSIONS.map(ext => `${person.name}.${ext}`);
}

function generate() {
  const month = parseInt(monthSel.value);
  const day = parseInt(daySel.value);
  const person = findPerson(month, day);
  const cosmosImageEl = document.getElementById('cosmosImage');
  const cosmosCanvasEl = document.getElementById('cosmosCanvas');

  if (!person && !DEFAULT_LETTER) {
    const err = document.getElementById('errorMsg');
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 2500);
    return;
  }

  currentMonth = month;
  currentDay = day;

  const letterContent = person
    ? person.letter
    : pickRandomNumberedBlock(DEFAULT_LETTER.letter);
  const seed = birthdaySeed(month, day);

  document.getElementById('intro').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('btnBack').style.display = 'block';

  const personImageCandidates = buildPersonImageCandidates(person);

  if (personImageCandidates.length > 0) {
    const fallbackImages = CUSTOM_COSMOS_IMAGE.trim() ? [CUSTOM_COSMOS_IMAGE] : [];
    showImageOrFallback(cosmosImageEl, cosmosCanvasEl, [...personImageCandidates, ...fallbackImages], seed);
  } else if (CUSTOM_COSMOS_IMAGE.trim()) {
    showImageOrFallback(cosmosImageEl, cosmosCanvasEl, [CUSTOM_COSMOS_IMAGE], seed);
  } else {
    showCanvasCosmos(cosmosCanvasEl, cosmosImageEl, seed);
  }

  typewriterEffect(
    document.getElementById('letterText'),
    letterContent,
    () => {
      document.getElementById('divider').classList.add('visible');
      document.getElementById('pageNum').classList.add('visible');
    }
  );
}

function goBack() {
  stopTypewriter();
  document.getElementById('result').style.display = 'none';
  document.getElementById('btnBack').style.display = 'none';
  document.getElementById('intro').style.display = 'flex';
  document.getElementById('letterText').innerHTML = '';
  document.getElementById('divider').classList.remove('visible');
  document.getElementById('pageNum').classList.remove('visible');
}

window.addEventListener('resize', () => {
  const canvasEl = document.getElementById('cosmosCanvas');
  if (document.getElementById('result').style.display === 'block' && canvasEl.style.display !== 'none') {
    drawCosmos(document.getElementById('cosmosCanvas'), birthdaySeed(currentMonth, currentDay));
  }
});

const mouseComet = document.getElementById('mouseComet');
const cursorTrailLayer = document.getElementById('cursorTrailLayer');
let mouseCometVisible = false;
let lastTrailTime = 0;
let lastTrailX = null;
let lastTrailY = null;

function createCursorTrail(x, y, dx, dy) {
  if (!cursorTrailLayer) return;
  const seg = document.createElement('span');
  seg.className = 'cursor-trail';
  const len = Math.min(18, Math.max(7, Math.hypot(dx, dy) * 0.9));
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;
  seg.style.left = `${x}px`;
  seg.style.top = `${y}px`;
  seg.style.width = `${len}px`;
  seg.style.transform = `rotate(${angle}deg)`;
  cursorTrailLayer.appendChild(seg);
  seg.addEventListener('animationend', () => seg.remove(), { once: true });
}

window.addEventListener('mousemove', (e) => {
  if (!mouseComet) return;
  const x = e.clientX;
  const y = e.clientY;
  mouseComet.style.left = `${x}px`;
  mouseComet.style.top = `${y}px`;

  if (lastTrailX !== null && lastTrailY !== null) {
    const now = performance.now();
    const dx = x - lastTrailX;
    const dy = y - lastTrailY;
    const moved = Math.hypot(dx, dy);
    if (moved > 2 && now - lastTrailTime > 18) {
      createCursorTrail(lastTrailX, lastTrailY, dx, dy);
      lastTrailTime = now;
    }
  }
  lastTrailX = x;
  lastTrailY = y;

  if (!mouseCometVisible) {
    mouseComet.classList.add('visible');
    mouseCometVisible = true;
  }
});

window.addEventListener('mouseleave', () => {
  if (!mouseComet) return;
  mouseComet.classList.remove('visible');
  mouseCometVisible = false;
  lastTrailX = null;
  lastTrailY = null;
});
</script>
